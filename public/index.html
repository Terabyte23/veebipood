<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veebipood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Veebipood</div>
        <div class="nav-right">
            <div id="cart-indicator" class="cart-indicator" style="display:none;" onclick="showCart()">
                Ostukorv (<span id="cart-count">0</span>)
            </div>
            <div id="auth-section">
                <button class="btn btn-outline" onclick="showLogin()">Logi sisse</button>
                <button class="btn btn-primary" onclick="showSignup()">Registreeru</button>
            </div>
            <div id="user-section" style="display:none;">
                <span id="username-display" class="username"></span>
                <button class="btn btn-outline" onclick="showMyOrders()">Minu tellimused</button>
                <button class="btn btn-outline" onclick="logout()">Logi välja</button>
            </div>
        </div>
    </nav>

    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div class="container">
        <div class="stats-bar" id="stats-bar"></div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Otsi toodet..." oninput="searchProducts()">
            <select id="category-filter" onchange="filterByCategory()">
                <option value="">Kõik kategooriad</option>
            </select>
        </div>

        <div id="products-grid" class="products-grid"></div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentUser = null;
        let cart = [];

        async function init() {
            await loadCategories();
            await loadProducts();
            await loadStats();
            if (token) await loadCurrentUser();
            updateCartIndicator();
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const d = await res.json();
                document.getElementById('stats-bar').innerHTML = `
                    <div class="stat"><span class="stat-num">${d.totalProducts}</span><span class="stat-label">Toodet</span></div>
                    <div class="stat"><span class="stat-num">${d.totalOrders}</span><span class="stat-label">Tellimust</span></div>
                    <div class="stat"><span class="stat-num">${d.activeOrders}</span><span class="stat-label">Aktiivset</span></div>
                    <div class="stat"><span class="stat-num">${d.totalUsers}</span><span class="stat-label">Kasutajat</span></div>
                `;
            } catch {}
        }

        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/users/me', { headers: { 'Authorization': token } });
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('user-section').style.display = 'flex';
                    document.getElementById('username-display').textContent = currentUser.name;
                } else { token = null; localStorage.removeItem('token'); }
            } catch {}
        }

        async function loadProducts() {
            const res = await fetch('/api/products');
            const d = await res.json();
            renderProducts(d.products);
        }

        async function searchProducts() {
            const q = document.getElementById('search-input').value;
            document.getElementById('category-filter').value = '';
            if (!q) return loadProducts();
            const res = await fetch(`/api/products/search?name=${encodeURIComponent(q)}`);
            const d = await res.json();
            renderProducts(d.results || []);
        }

        async function filterByCategory() {
            const cat = document.getElementById('category-filter').value;
            document.getElementById('search-input').value = '';
            if (!cat) return loadProducts();
            const res = await fetch(`/api/products/category/${encodeURIComponent(cat)}`);
            const d = await res.json();
            renderProducts(d.products || []);
        }

        async function loadCategories() {
            const res = await fetch('/api/products/categories');
            const d = await res.json();
            const select = document.getElementById('category-filter');
            d.categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
                select.appendChild(opt);
            });
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if (!products || products.length === 0) { grid.innerHTML = '<p class="empty">Tooteid ei leitud.</p>'; return; }
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-category">${p.category}</div>
                    <h3>${p.name}</h3>
                    <p class="product-desc">${p.description}</p>
                    <div class="product-footer">
                        <div class="product-price">€${p.price.toFixed(2)}</div>
                        <div class="product-stock ${p.stock > 0 ? 'in-stock' : 'out-stock'}">
                            ${p.stock > 0 ? `Laos: ${p.stock}` : 'Otsas'}
                        </div>
                    </div>
                    ${p.stock > 0 ? `<button class="btn btn-primary btn-sm" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Lisa korvi</button>` : ''}
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            if (!token) { showLogin(); return; }
            const existing = cart.find(i => i.productId === id);
            if (existing) existing.quantity++;
            else cart.push({ productId: id, name, price, quantity: 1 });
            updateCartIndicator();
        }

        function updateCartIndicator() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cart-count').textContent = total;
            document.getElementById('cart-indicator').style.display = total > 0 ? 'block' : 'none';
        }

        function showCart() {
            const html = cart.length === 0 ? '<p class="empty">Ostukorv on tühi.</p>' : `
                ${cart.map(i => `
                    <div class="cart-item">
                        <span>${i.name} x${i.quantity}</span>
                        <span>€${(i.price * i.quantity).toFixed(2)}</span>
                        <button onclick="removeFromCart(${i.productId})">x</button>
                    </div>
                `).join('')}
                <div class="cart-total">Kokku: €${cart.reduce((s,i) => s + i.price * i.quantity, 0).toFixed(2)}</div>
                <button class="btn btn-primary w-full" onclick="placeOrder()">Telli</button>
                <div id="order-msg" style="display:none;"></div>
            `;
            document.getElementById('modal-content').innerHTML = `<h2>Ostukorv</h2>${html}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.productId !== id);
            updateCartIndicator();
            showCart();
        }

        async function placeOrder() {
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ items: cart.map(i => ({ productId: i.productId, quantity: i.quantity })) })
            });
            const d = await res.json();
            const msg = document.getElementById('order-msg');
            if (res.ok) {
                msg.className = 'success-msg';
                msg.textContent = `Tellimus #${d.order.id} loodud! Staatus: ${d.order.status}`;
                cart = []; updateCartIndicator();
            } else {
                msg.className = 'error-msg';
                msg.textContent = d.error;
            }
            msg.style.display = 'block';
            loadStats();
        }

        async function showMyOrders() {
            const res = await fetch('/api/orders/me', { headers: { 'Authorization': token } });
            const d = await res.json();
            const html = d.orders.length === 0 ? '<p class="empty">Tellimusi pole.</p>' :
                d.orders.map(o => `
                    <div class="order-card">
                        <div class="order-header">
                            <strong>Tellimus #${o.id}</strong>
                            <span class="status-badge">${o.status}</span>
                        </div>
                        <div class="order-items">${o.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                        <div class="order-total">€${o.total.toFixed(2)}</div>
                    </div>
                `).join('');
            document.getElementById('modal-content').innerHTML = `<h2>Minu tellimused</h2>${html}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function showLogin() {
            document.getElementById('modal-content').innerHTML = `
                <h2>Logi sisse</h2>
                <div class="form-group"><label>Kasutajanimi</label><input type="text" id="lu"></div>
                <div class="form-group"><label>Parool</label><input type="password" id="lp"></div>
                <div id="le" class="error-msg" style="display:none;"></div>
                <button class="btn btn-primary w-full" onclick="login()">Logi sisse</button>
                <p class="hint">Testikontod: mari / 1234 või jaan / 1234</p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function showSignup() {
            document.getElementById('modal-content').innerHTML = `
                <h2>Registreeru</h2>
                <div class="form-group"><label>Nimi</label><input type="text" id="sn"></div>
                <div class="form-group"><label>Kasutajanimi</label><input type="text" id="su"></div>
                <div class="form-group"><label>Parool</label><input type="password" id="sp"></div>
                <div id="se" class="error-msg" style="display:none;"></div>
                <button class="btn btn-primary w-full" onclick="signup()">Registreeru</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        async function login() {
            const res = await fetch('/api/users/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('lu').value, password: document.getElementById('lp').value }) });
            const d = await res.json();
            if (res.ok) { token = d.token; localStorage.setItem('token', token); currentUser = d.user; document.getElementById('auth-section').style.display = 'none'; document.getElementById('user-section').style.display = 'flex'; document.getElementById('username-display').textContent = currentUser.name; closeModal(); loadProducts(); }
            else { const e = document.getElementById('le'); e.textContent = d.error; e.style.display = 'block'; }
        }

        async function signup() {
            const res = await fetch('/api/users/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('sn').value, username: document.getElementById('su').value, password: document.getElementById('sp').value }) });
            const d = await res.json();
            if (res.ok) { token = d.token; localStorage.setItem('token', token); currentUser = d.user; document.getElementById('auth-section').style.display = 'none'; document.getElementById('user-section').style.display = 'flex'; document.getElementById('username-display').textContent = currentUser.name; closeModal(); }
            else { const e = document.getElementById('se'); e.textContent = d.error; e.style.display = 'block'; }
        }

        async function logout() {
            await fetch('/api/users/logout', { method: 'POST', headers: { 'Authorization': token } });
            token = null; currentUser = null; localStorage.removeItem('token');
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('user-section').style.display = 'none';
            loadProducts();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

        init();
    </script>
</body>
</html>
